[theme]
# Professional Bank Theme - Clean, Modern, Reputed Brand Look
# Using Streamlit native feel with subtle professional accents
base = "light"
primaryColor = "#1E3A5F"           # Deep navy - trust, professionalism
backgroundColor = "#FAFBFC"        # Clean white/gray - Streamlit native
secondaryBackgroundColor = "#F1F3F6" # Subtle light gray - cards/sidebar
textColor = "#1F2937"              # Dark slate - easy reading
font = "sans serif"

[server]
headless = true
runOnSave = false

[browser]
gatherUsageStats = false
